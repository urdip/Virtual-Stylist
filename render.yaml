services:
  # FastAPI Backend
  - type: web
    name: virtual-stylist-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CORS_ORIGINS
        value: "*"
      - key: UPLOADS_DIR
        value: "/tmp/uploads"
      - key: KLINGAI_ACCESS_KEY
        sync: false
      - key: KLINGAI_SECRET_KEY
        sync: false
    healthCheckPath: /docs
